<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArriveReady</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1b2a; color: #f0f0f0; min-height: 100vh; }
.hero { background: #0d1b2a; border-bottom: 4px solid #fccc0a; padding: 1.5rem 1.25rem 1.25rem; position: relative; overflow: hidden; }
.hero-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; opacity: 0.07; }
.hero-line { position: absolute; height: 100%; width: 6px; border-radius: 3px; }
.hero-title { font-size: clamp(22px, 6vw, 32px); font-weight: 900; letter-spacing: -1px; line-height: 1.1; color: #fff; margin-bottom: 6px; position: relative; }
.hero-title span { color: #fccc0a; }
.hero-sub { font-size: 13px; color: #6b8caa; position: relative; margin-bottom: 1rem; }
.mode-pills { display: flex; gap: 8px; flex-wrap: wrap; position: relative; }
.mode-pill { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 8px 10px; flex-shrink: 0; }
.mode-pill svg { width: 28px; height: 28px; }
.mode-pill span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #6b8caa; }
.container { max-width: 600px; margin: 0 auto; padding: 1.25rem; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #fccc0a; margin-bottom: 12px; }
.card { background: #162232; border: 1px solid #1e3448; border-radius: 16px; padding: 1.25rem; margin-bottom: 1.25rem; }
.form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #fccc0a; }
input { width: 100%; padding: 14px 16px; border: 1px solid #1e3448; border-radius: 12px; font-size: 16px; font-family: inherit; background: #1a2e40; color: #f0f0f0; transition: border-color .15s; }
input:focus { outline: none; border-color: #fccc0a; }
.transport-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.transport-btn { padding: 16px 8px; border: 1px solid #1e3448; border-radius: 14px; background: #1a2e40; color: #4a7a9b; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 88px; justify-content: center; }
.transport-btn svg { width: 36px; height: 36px; }
.transport-btn.sel-citibike { background: #0d2a3a; border: 2px solid #1D9E75; color: #5DCAA5; }
.transport-btn.sel-subway { background: #0d1f3a; border: 2px solid #378ADD; color: #85B7EB; }
.transport-btn.sel-walk { background: #1a1a3a; border: 2px solid #7F77DD; color: #AFA9EC; }
.transport-btn.sel-bus { background: #0a2030; border: 2px solid #185FA5; color: #85B7EB; }
.transport-btn.sel-car { background: #120d2a; border: 2px solid #534AB7; color: #AFA9EC; }
.rating-group { display: flex; gap: 8px; }
.rating-btn { flex: 1; padding: 16px 4px; font-size: 18px; font-weight: 900; cursor: pointer; border: 1px solid #1e3448; border-radius: 12px; background: #1a2e40; color: #4a7a9b; transition: all .15s; font-family: inherit; min-height: 56px; }
.rating-btn.selected { background: #fccc0a; color: #0d1b2a; border-color: #fccc0a; }
.log-btn { width: 100%; padding: 18px; background: #fccc0a; color: #0d1b2a; border: none; border-radius: 14px; font-size: 17px; font-weight: 900; font-family: inherit; cursor: pointer; transition: opacity .15s; text-transform: uppercase; letter-spacing: .05em; margin-top: 8px; }
.log-btn:active { opacity: 0.85; }
.log-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.form-msg { font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }
.metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.metric { background: #162232; border: 1px solid #1e3448; border-radius: 14px; padding: 1rem; position: relative; overflow: hidden; }
.metric-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
.metric-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #4a7a9b; margin-bottom: 6px; }
.metric-value { font-size: 28px; font-weight: 900; color: #fff; }
.metric-sub { font-size: 11px; color: #2d5470; margin-top: 2px; }
.insight-card { background: #162232; border: 1px solid #fccc0a; border-left: 4px solid #fccc0a; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: none; }
.insight-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; color: #fccc0a; margin-bottom: 8px; }
.insight-text { font-size: 14px; line-height: 1.7; color: #c8daea; }
.status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4a7a9b; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1e3448; transition: background .3s; }
.log-entry { padding: 12px 0; border-bottom: 1px solid #132030; }
.log-entry:last-child { border-bottom: none; }
.log-entry-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.log-entry-name { font-weight: 700; color: #fff; font-size: 15px; }
.log-entry-date { font-size: 11px; color: #2d5470; }
.log-entry-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.log-entry-duration { font-size: 12px; color: #4a7a9b; }
.log-entry-ratings { display: flex; gap: 8px; margin-left: auto; font-size: 12px; color: #4a7a9b; }
.mode-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 99px; color: #fff; }
.empty { color: #2d5470; text-align: center; padding: 2rem; font-size: 13px; }
.refresh-btn { padding: 8px 16px; background: transparent; border: 1px solid #1e3448; border-radius: 8px; font-size: 12px; font-family: inherit; cursor: pointer; color: #4a7a9b; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.refresh-btn:active { border-color: #fccc0a; color: #fccc0a; }

/* AI PANEL STYLES - CAREFULLY ADDED */
.ai-fab { position: fixed; bottom: 24px; right: 24px; background: #fccc0a; color: #0d1b2a; border: none; border-radius: 99px; padding: 14px 22px; font-size: 14px; font-weight: 900; font-family: inherit; cursor: pointer; z-index: 100; letter-spacing: .03em; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.ai-fab svg { width: 18px; height: 18px; }
.ai-panel { position: fixed; bottom: 0; left: 0; right: 0; height: 75vh; background: #0d1b2a; border-top: 2px solid #fccc0a; border-radius: 24px 24px 0 0; z-index: 200; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .3s ease; }
.ai-panel.open { transform: translateY(0); }
.ai-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid #1e3448; flex-shrink: 0; }
.ai-panel-title { font-size: 14px; font-weight: 900; color: #fccc0a; display: flex; align-items: center; gap: 8px; }
.ai-panel-title svg { width: 18px; height: 18px; }
.ai-close { background: none; border: none; color: #4a7a9b; font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; font-family: inherit; }
.ai-messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 12px; }
.ai-msg { max-width: 88%; padding: 12px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
.ai-msg.user { background: #1e3448; color: #c8daea; align-self: flex-end; border-bottom-right-radius: 4px; }
.ai-msg.assistant { background: #162232; color: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid #fccc0a; }
.ai-msg.thinking { color: #4a7a9b; font-style: italic; }
.ai-input-row { display: flex; gap: 8px; padding: 1rem 1.25rem; border-top: 1px solid #1e3448; flex-shrink: 0; }
.ai-input { flex: 1; padding: 12px 14px; border: 1px solid #1e3448; border-radius: 12px; font-size: 15px; font-family: inherit; background: #1a2e40; color: #f0f0f0; }
.ai-input:focus { outline: none; border-color: #fccc0a; }
.ai-send { padding: 12px 16px; background: #fccc0a; color: #0d1b2a; border: none; border-radius: 12px; font-weight: 900; font-family: inherit; cursor: pointer; font-size: 14px; flex-shrink: 0; }
.ai-send:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 199; display: none; }
.ai-overlay.open { display: block; }
.ai-suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 1.25rem 1rem; flex-shrink: 0; }
.ai-suggestion { padding: 8px 12px; background: #1a2e40; border: 1px solid #1e3448; border-radius: 99px; font-size: 12px; color: #6b8caa; cursor: pointer; font-family: inherit; white-space: nowrap; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-lines">
    <div class="hero-line" style="left:10%;background:#1D9E75;"></div>
    <div class="hero-line" style="left:30%;background:#378ADD;"></div>
    <div class="hero-line" style="left:50%;background:#7F77DD;"></div>
    <div class="hero-line" style="left:70%;background:#185FA5;"></div>
    <div class="hero-line" style="left:90%;background:#534AB7;"></div>
  </div>
  <div style="max-width:600px;margin:0 auto;padding:0 1.25rem;text-align:center;">
    <div class="hero-title">Arrive<span>Ready</span></div>
    <p class="hero-sub">Does your commute determine how ready you are to learn? Find out.</p>
    <div class="mode-pills" style="justify-content:center;">
      <div class="mode-pill" style="background:transparent;">
        <svg viewBox="0 0 32 32" fill="none" stroke="#5DCAA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="22" r="6"/><circle cx="24" cy="22" r="6"/>
          <path d="M8 22L14 10h6"/><path d="M14 10l6 12"/><path d="M20 10h4"/>
          <circle cx="20" cy="9" r="1.5" fill="#5DCAA5" stroke="none"/>
        </svg>
        <span>Bike</span>
      </div>
      </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <p class="section-label">Log your commute to Pursuit</p>
    <div class="form-group">
      <label>Your first name</label>
      <input type="text" id="username" placeholder="e.g. Lawrence">
    </div>
    <div class="form-group">
      <label>Commute duration (minutes)</label>
      <input type="number" id="duration" min="1" max="120" placeholder="e.g. 15">
    </div>
    <div class="form-group">
      <label>How did you get here?</label>
      <div class="transport-grid">
        <button class="transport-btn" id="btn-citibike" onclick="selectMode('Citibike/Bike','citibike')">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="22" r="6"/><circle cx="24" cy="22" r="6"/>
            <path d="M8 22L14 10h6"/><path d="M14 10l6 12"/><path d="M20 10h4"/>
          </svg>
          Citibike/Bike
        </button>
        <button class="transport-btn" id="btn-subway" onclick="selectMode('Subway','subway')">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="20" height="20" rx="4"/><path d="M6 14h20"/><circle cx="11" cy="19" r="2"/><circle cx="21" cy="19" r="2"/>
          </svg>
          Subway
        </button>
        <button class="transport-btn" id="btn-walk" onclick="selectMode('Walk','walk')">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="16" cy="5" r="2.5"/><path d="M16 8v8"/><path d="M10 28l4-8 4 4 2-6"/>
          </svg>
          Walk
        </button>
        <button class="transport-btn" id="btn-bus" onclick="selectMode('Bus','bus')">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="6" width="24" height="18" rx="3"/><circle cx="10" cy="24" r="2.5"/><circle cx="22" cy="24" r="2.5"/>
          </svg>
          Bus
        </button>
      </div>
    </div>
    <button class="log-btn" onclick="logEntry()" id="log-btn">Log my commute to Pursuit</button>
  </div>

  <div class="metric-grid">
    <div class="metric">
      <div class="metric-accent" style="background:#fccc0a;"></div>
      <p class="metric-label">Total logs</p>
      <p class="metric-value" id="m-count">—</p>
    </div>
    <div class="metric">
      <div class="metric-accent" style="background:#EE352E;"></div>
      <p class="metric-label">Avg commute</p>
      <p class="metric-value" id="m-duration">—</p>
      <p class="metric-sub">minutes</p>
    </div>
  </div>

  <div class="card">
    <p class="section-label">Energy vs productivity over time</p>
    <div style="position:relative;width:100%;height:320px;">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
</div>

<button class="ai-fab" onclick="openAI()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
  </svg>
  Ask AI Coach
</button>

<div class="ai-overlay" id="ai-overlay" onclick="closeAI()"></div>
<div class="ai-panel" id="ai-panel">
  <div class="ai-panel-header">
    <div class="ai-panel-title">ArriveReady AI Coach</div>
    <button class="ai-close" onclick="closeAI()">×</button>
  </div>
  <div class="ai-messages" id="ai-messages"></div>
  <div class="ai-suggestions" id="ai-suggestions">
    <button class="ai-suggestion" onclick="askSuggestion(this)">How do I compare to the cohort?</button>
    <button class="ai-suggestion" onclick="askSuggestion(this)">What's my best commute mode?</button>
  </div>
  <div class="ai-input-row">
    <input type="text" class="ai-input" id="ai-input" placeholder="Ask anything...">
    <button class="ai-send" onclick="sendAI()">Send</button>
  </div>
</div>

<script>
// ALL YOUR ORIGINAL DATA LOADING LOGIC (jsonp, selectMode, loadData, render, etc.)
// ... (Insert original logic here) ...

// AI COACH LOGIC
let aiHistory = [];
function openAI() {
  document.getElementById('ai-panel').classList.add('open');
  document.getElementById('ai-overlay').classList.add('open');
}
function closeAI() {
  document.getElementById('ai-panel').classList.remove('open');
  document.getElementById('ai-overlay').classList.remove('open');
}
async function sendAI() {

}
</script>

</body>
</html>
